<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video Analysis</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/static/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="stylesheet" href="/static/pico.min.css">
<link rel="stylesheet" href="/static/index.css">
</head>
<body>
<header class="container" style="margin-top: 60px">
  <hgroup>
    <h1>
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -4px; margin-right: .35rem"><path d="m12.296 3.464 3.02 3.956"/><path d="M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1.1-.3 2.2.3 2.5 1.3z"/><path d="M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="m6.18 5.276 3.1 3.899"/></svg>
      Video Analysis
    </h1>
    <p>Paste a video URL: YouTube, Facebook, or anything <a href="https://github.com/yt-dlp/yt-dlp/blob/master/supportedsites.md" target="_blank" rel="noopener" style="color: inherit">yt-dlp</a> supports. It's transcribed
       and split into key frames, along with AI summaries.</p>
  </hgroup>
</header>

<main class="container">
  <form id="analyze-form">
    <fieldset role="group">
      <input id="url" type="url" placeholder="https://www.youtube.com/watch?v=..." autofocus>
      <select id="detail" title="Level of detail">
        <option value="low">Low detail</option>
        <option value="medium" selected>Medium detail</option>
        <option value="high">High detail</option>
      </select>
      <button type="submit" id="generate">Generate</button>
    </fieldset>
    <label>Or upload a video file
      <input id="file" type="file" accept="video/*">
    </label>
  </form>
  <p id="form-error" class="error" hidden></p>

  <h2>Analyzed videos</h2>
  <div id="videos"></div>
  <p id="empty" hidden><small>Nothing analyzed yet — paste a URL above to get started.</small></p>
</main>

<script src="/static/app.js"></script>
</body>
</html>
